<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #f8f9fa;">
    <div class="container mt-5">
        <!-- Edit Profile form -->
        <form class="col-6 mx-auto card p-4 shadow-lg" method="post">
            <h1 style="text-align: center;"><span style="color: rgb(53, 53, 53);">OrainAuth</span></h1>
            <hr>
            <h3>Edit Profile</h3>

            {% csrf_token %}

            <!-- Display error/success messages -->
            {% if messages %}
            <div class="alert alert-primary" role="alert">
                {% for message in messages %}
                {{ message }}
                {% endfor %}
            </div>
            {% endif %}

            <!-- Loop through fields (First Name, Last Name, Email, etc.) -->
            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                <input type="{{ field.field.widget.input_type }}" 
                       name="{{ field.name }}" 
                       id="{{ field.id_for_label }}" 
                       class="form-control" 
                       placeholder="Enter {{ field.label }}"
                       value="{{ field.value|default:'' }}">
                
                {% if field.errors %}
                <small class="text-danger">{{ field.errors.0 }}</small>
                {% endif %}
            </div>
            {% endfor %}

            <!-- Submit button -->
            <button type="submit" class="btn btn-primary btn-block">Save Changes</button>
            
            <div class="text-center mt-3">
                <a href="{% url 'profile' %}" style="color: #6c757d;">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
