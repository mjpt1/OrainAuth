<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="col-6 mx-auto card p-4 shadow-lg text-center">
            <h1 style="text-align: center;"><span style="color: rgb(53, 53, 53);">OrainAuth</span></h1>
            <hr>
            <div class="alert alert-success">
                <h4>Check your email!</h4>
                <p>We have emailed instructions for setting up your new password to your email address.</p>
            </div>
            <p>If no email arrives, please make sure you entered the correct address.</p>
            <a href="{% url 'login' %}" class="btn btn-primary mt-3">Back to Login</a>
        </div>
    </div>
</body>
</html>
