<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #f8f9fa;">
    <div class="container mt-5">
        <!-- Profile Card -->
        <div class="col-6 mx-auto card p-4 shadow-lg text-center">
            <h1 style="text-align: center;"><span style="color: rgb(53, 53, 53);">OrainAuth</span></h1>
            <hr>
            <h3>My Profile</h3>

            <div class="my-4">
                <img src="https://ui-avatars.com/api/?name={{ user.username }}&size=128&background=0D8ABC&color=fff" class="rounded-circle mb-3 shadow-sm" alt="Avatar">
                <h4 class="text-dark">{{ user.username }}</h4>
                <p class="text-muted">{{ user.email }}</p>
            </div>

            <div class="text-left border-top pt-3">
                <p><strong>First Name:</strong> {{ user.first_name }}</p>
                <p><strong>Last Name:</strong> {{ user.last_name }}</p>
                <p><strong>Email:</strong> {{ user.email }}</p>
            </div>

            <hr>

            <!-- Action Buttons -->
            <div class="d-flex justify-content-between">
                <a href="{% url 'edit_profile' %}" class="btn btn-outline-primary btn-sm">Edit Profile</a>
                <a href="{% url 'change_password' %}" class="btn btn-outline-secondary btn-sm">Security</a>
            </div>
            
            <div class="mt-3">
                <form method="post" action="{% url 'logout' %}" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-link text-danger small p-0">Logout</button>
                </form><br><br>
                <a href="{% url 'dashboard' %}">Back To Dashboard</a>
            </div>
        </div>
    </div>
</body>
</html>
